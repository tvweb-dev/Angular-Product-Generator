<header class="app-header">
  <div class="app-header__inner">
    <div class="brand-block">
      <h1>{{ title() }}</h1>
      <p class="tagline">Build, preview, and export product objects fast.</p>
    </div>

    <div class="header-actions">
      <nav class="main-nav" aria-label="Primary navigation">
        <a routerLink="/products" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Product List
        </a>
        <a routerLink="/products/new" routerLinkActive="active">
          Create Product
        </a>
      </nav>
    </div>
  </div>
</header>

<div class="gitlink">
  <a href="https://github.com/tvweb-dev/Angular-Product-Generator.git" target="_blank" rel="noopener noreferrer">
    View source on GitHub and customize it for your workflow.
  </a>
</div>
<main class="app-main">
  <router-outlet />
</main>
